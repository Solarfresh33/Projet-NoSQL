services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Relationnel : users, reviews, listes, statuts de jeu
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: gameshelf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gameshelf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gameshelf}
      POSTGRES_DB: ${POSTGRES_DB:-gameshelf}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Tout fichier .sql ici est exécuté au premier démarrage (init reproductible)
      - ./seeds/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gameshelf} -d ${POSTGRES_DB:-gameshelf}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MongoDB — Document : fiches de jeux (schéma variable), logs d'activité
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:8
    container_name: gameshelf-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-gameshelf}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-gameshelf}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-gameshelf}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
      # Les scripts .js ici sont joués au premier démarrage de la base
      - ./seeds/mongo:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis — Clé-valeur (mémoire) : sessions, cache, classements, compteurs
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8
    container_name: gameshelf-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Neo4j — Graphe : réseau social (FOLLOWS), recommandations, jeux similaires
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:2025.05-community
    container_name: gameshelf-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-gameshelf123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_pagecache_size: 256M
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Interface web Neo4j Browser
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Protocole Bolt (driver)
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ---------------------------------------------------------------------------
  # Application Node.js / Express — se connecte réellement aux 4 bases
  # ---------------------------------------------------------------------------
  app:
    build: ./app
    container_name: gameshelf-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      PORT: 3000
      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-gameshelf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gameshelf}
      POSTGRES_DB: ${POSTGRES_DB:-gameshelf}
      # MongoDB
      MONGO_URL: mongodb://${MONGO_USER:-gameshelf}:${MONGO_PASSWORD:-gameshelf}@mongo:27017/${MONGO_DB:-gameshelf}?authSource=admin
      MONGO_DB: ${MONGO_DB:-gameshelf}
      # Redis
      REDIS_URL: redis://redis:6379
      # Neo4j
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-gameshelf123}
      # Lance le seed Mongo/Neo4j/Redis au démarrage de l'app
      RUN_SEED: "true"
    volumes:
      # Donne accès au script Cypher de seed Neo4j depuis l'app
      - ./seeds:/usr/src/app/seeds:ro
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  neo4j-data:
